version: '3.8'
services:
  mongo:
    image: mongo:6
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
    ports:
      - 27017:27017

  backend:
    build: ./backend
    env_file: ./backend/.env.example
    ports:
      - 4000:4000
    depends_on:
      - mongo

  frontend:
    build: ./frontend
    ports:
      - 5173:5173
    environment:
      - VITE_API_URL=http://localhost:4000/api
    depends_on:
      - backend

volumes:
  mongo-data:
